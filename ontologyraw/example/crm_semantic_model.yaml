    metrics:
      # ---------------
      # 营销漏斗前端
      # ---------------
      - name: total_leads
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(leads.lead_id)
        description: 总线索数
        ai_context:
          synonyms: ["线索数", "新增线索"]

      - name: converted_leads
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN leads.is_converted = true THEN 1 ELSE 0 END)
        description: 已转化线索数
        ai_context:
          synonyms: ["转化线索数", "有效线索数"]

      - name: lead_conversion_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN leads.is_converted = true THEN 1 ELSE 0 END) / NULLIF(SUM(CASE WHEN leads.status != 'New' THEN 1 ELSE 0 END), 0)
        description: 线索转化率(已转化线索 / 已处理线索)
        ai_context:
          synonyms: ["线索转化率"]

      - name: campaign_roi
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunities.amount ELSE 0 END) / NULLIF(SUM(campaigns.actual_cost), 0)
        description: 营销活动 ROI(关联商机赢单金额 / 实际成本)
        ai_context:
          synonyms: ["活动ROI", "投资回报率"]

      # ---------------
      # 销售管道/营收
      # ---------------
      - name: won_opportunity_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN 1 ELSE 0 END)
        description: 赢单商机数(已关闭且赢单)
        ai_context:
          synonyms: ["赢单数", "成交商机数"]

      - name: closed_opportunity_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true THEN 1 ELSE 0 END)
        description: 已关闭商机数(含赢单与丢单)
        ai_context:
          synonyms: ["关闭商机数", "已关闭数"]

      - name: win_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN 1 ELSE 0 END) / NULLIF(SUM(CASE WHEN opportunities.is_closed = true THEN 1 ELSE 0 END), 0)
        description: 赢单率(赢单数 / 已关闭数)
        ai_context:
          synonyms: ["成交率", "赢单率"]

      - name: won_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunities.amount ELSE 0 END)
        description: 赢单金额(已关闭且赢单的 amount 汇总)
        ai_context:
          synonyms: ["成交金额", "赢单金额", "签约金额"]

      - name: weighted_pipeline_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = false THEN opportunities.amount * opportunities.probability ELSE 0 END)
        description: 加权管道金额(未关闭商机 amount * probability)
        ai_context:
          synonyms: ["加权管道", "加权金额", "预计收入"]

      - name: avg_sales_cycle_days
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(CASE WHEN opportunities.is_closed = true THEN (opportunities.close_date - opportunities.created_date) END)
        description: 平均销售周期(关闭日期 - 创建日期；单位依赖底层日期类型/引擎)
        ai_context:
          synonyms: ["销售周期", "成交周期"]

      - name: avg_deal_size
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunities.amount ELSE 0 END) / NULLIF(SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN 1 ELSE 0 END), 0)
        description: 平均客单(赢单金额 / 赢单数)
        ai_context:
          synonyms: ["平均单笔金额", "平均成交金额"]

      # ---------------
      # 产品维度(明细事实)
      # ---------------
      - name: won_product_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunity_line_items.total_price ELSE 0 END)
        description: 赢单产品营收(按商机产品明细 total_price 汇总；需通过 relationship join 到 opportunities 过滤赢单)
        ai_context:
          synonyms: ["产品营收", "按产品的成交额"]

      - name: product_units_sold
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunity_line_items.quantity ELSE 0 END)
        description: 产品售出数量(赢单商机对应明细 quantity 汇总)
        ai_context:
          synonyms: ["产品销量", "卖出数量"]

      # ---------------
      # 客户维度(跨数据集)
      # ---------------
      - name: revenue_per_account
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = true AND opportunities.is_won = true THEN opportunities.amount ELSE 0 END) / NULLIF(COUNT(DISTINCT accounts.account_id), 0)
        description: 每客户平均收入(赢单金额 / 客户去重数；口径为所有客户)
        ai_context:
          synonyms: ["客户价值", "每客户收入"]

      # ---------------
      # 活动与工单(服务运营)
      # ---------------
      - name: activity_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(tasks.task_id)
        description: 活动数量(跟进/电话/邮件等)
        ai_context:
          synonyms: ["跟进次数", "活动量"]

      - name: completed_activity_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN tasks.status = 'Completed' THEN 1 ELSE 0 END)
        description: 已完成活动数量
        ai_context:
          synonyms: ["已完成跟进", "完成活动数"]

      - name: open_case_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN cases.closed_date IS NULL THEN 1 ELSE 0 END)
        description: 未关闭工单数
        ai_context:
          synonyms: ["未结工单", "未关闭工单"]

      - name: avg_case_resolution_days
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(CASE WHEN cases.closed_date IS NOT NULL THEN (cases.closed_date - cases.created_date) END)
        description: 平均工单解决时长(关闭-创建；单位依赖底层日期类型/引擎)
        ai_context:
          synonyms: ["工单解决时长", "平均解决时间"]

      # ---------------
      # 效率与健康度指标
      # ---------------
      - name: stagnant_opportunities
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN opportunities.is_closed = false AND CURRENT_DATE - opportunities.created_date > 30 THEN 1 ELSE 0 END)
        description: 停滞商机数(未关闭且创建超过30天)
        ai_context:
          synonyms: ["停滞商机", "僵尸单"]

