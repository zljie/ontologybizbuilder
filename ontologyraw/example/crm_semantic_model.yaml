# yaml-language-server: $schema=../core-spec/osi-schema.json

version: "0.1.1"

semantic_model:
  - name: salesforce_crm_ontology_model
    description: Salesforce CRM 语义本体模型(销售管道/客户与联系人/活动/工单/产品与报价)
    ai_context:
      instructions: "用于 CRM 经营分析与问答。核心事实表为 opportunities(商机)与 opportunity_line_items(商机产品明细),并结合 tasks(跟进活动)与 cases(客户工单)进行全链路分析。默认以 is_closed=true 且 is_won=true 作为赢单口径；如需包含已关闭未赢单,请明确说明。"
      synonyms:
        - "Salesforce"
        - "CRM"
        - "客户关系管理"
        - "销售管道"
        - "商机"
      examples:
        - "本月赢单金额是多少？"
        - "按销售人员统计赢单率"
        - "按行业看管道加权金额"
        - "某客户的商机明细有哪些？"
        - "本月新增线索数与转化率是多少？"
        - "工单平均解决时长是多少？"

    datasets:
      # ---------------------------
      # Fact: Leads (Marketing/Sales Frontend)
      # ---------------------------
      - name: leads
        source: salesforce.salesforce.lead
        primary_key: [lead_id]
        unique_keys:
          - [lead_id]
          - [lead_sf_id]
        description: 销售线索(潜在客户)
        ai_context:
          synonyms:
            - "线索"
            - "潜在客户"
            - "Leads"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SALESFORCE_CRM",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "leads/convert",
                    "title": "线索转化",
                    "kind": "command",
                    "operation": "convert",
                    "aggregate": "Lead",
                    "entity_name": "leads",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["lead_id"],
                        "properties": {
                          "lead_id": { "type": "string" },
                          "create_opportunity": { "type": "boolean", "default": true }
                        }
                      }
                    },
                    "examples": ["将线索转化为商机和客户", "把线索转了"],
                    "tags": ["crud", "转化", "营销"]
                  },
                  {
                    "id": "leads/assign",
                    "title": "分配线索",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Lead",
                    "entity_name": "leads",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["lead_id", "owner_id"],
                        "properties": {
                          "lead_id": { "type": "string" },
                          "owner_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["把这批线索分配给张三", "转移线索负责人"],
                    "tags": ["分配", "派单"]
                  },
                  {
                    "id": "leads/mark_unqualified",
                    "title": "标记线索为无效",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Lead",
                    "entity_name": "leads",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["lead_id"],
                        "properties": {
                          "lead_id": { "type": "string" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["线索无效作除", "关闭未联系上的线索"],
                    "tags": ["作废", "清理"]
                  }
                ],
                "rules": [
                  {
                    "id": "crm/rule_lead_conversion",
                    "title": "线索转化率计算口径",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "filter" },
                    "message": "计算线索转化率时，分母应为已处理线索（status != 'New'），而非所有线索。",
                    "tags": ["口径", "转化率"]
                  }
                ]
              }
        fields:
          - name: lead_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.lead_id
            description: 线索内部ID
          - name: lead_sf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.lead_sf_id
            description: Salesforce Lead.Id
          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.name
            description: 线索姓名
          - name: company
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.company
            description: 公司名称
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.status
            description: 状态(New, Contacted, Qualified, Lost)
          - name: lead_source
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.lead_source
            description: 线索来源
          - name: campaign_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.campaign_id
            description: 关联营销活动ID
          - name: owner_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.owner_id
            description: 负责人ID
          - name: is_converted
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.is_converted
            description: 是否已转化
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.created_date
            description: 创建日期
            dimension:
              is_time: true
          - name: converted_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: leads.converted_date
            description: 转化日期
            dimension:
              is_time: true

      # ---------------------------
      # Fact: Campaigns (Marketing)
      # ---------------------------
      - name: campaigns
        source: salesforce.salesforce.campaign
        primary_key: [campaign_id]
        unique_keys:
          - [campaign_id]
          - [campaign_sf_id]
        description: 营销活动(市场投放/活动)
        ai_context:
          synonyms:
            - "营销活动"
            - "市场活动"
            - "Campaign"
        fields:
          - name: campaign_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.campaign_id
            description: 活动内部ID
          - name: campaign_sf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.campaign_sf_id
            description: Salesforce Campaign.Id
          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.name
            description: 活动名称
          - name: type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.type
            description: 活动类型(Webinar, Email, Trade Show 等)
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.status
            description: 状态(Planned, In Progress, Completed, Aborted)
          - name: budgeted_cost
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.budgeted_cost
            description: 预算成本
          - name: actual_cost
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.actual_cost
            description: 实际成本
          - name: start_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.start_date
            description: 开始日期
            dimension:
              is_time: true
          - name: end_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: campaigns.end_date
            description: 结束日期
            dimension:
              is_time: true

      # ---------------------------
      # Fact: Opportunities
      # ---------------------------
      - name: opportunities
        source: salesforce.salesforce.opportunity
        primary_key: [opportunity_id]
        unique_keys:
          - [opportunity_id]
          - [opportunity_sf_id]
        description: 商机事实表(销售管道核心)
        ai_context:
          synonyms:
            - "商机"
            - "销售机会"
            - "机会"
            - "管道"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "PALANTIR",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "opportunities/create",
                    "title": "创建商机",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["account_id", "stage_name", "close_date"],
                        "properties": {
                          "account_id": { "type": "string" },
                          "owner_user_id": { "type": "string" },
                          "stage_name": { "type": "string" },
                          "amount": { "type": "number" },
                          "probability": { "type": "number" },
                          "close_date": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["为某客户创建一个新商机", "新建商机并设置预计关闭日期"],
                    "tags": ["crud", "商机", "写入"]
                  },
                  {
                    "id": "opportunities/read",
                    "title": "查询商机（按ID）",
                    "kind": "query",
                    "operation": "read",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id"],
                        "properties": {
                          "opportunity_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["查询某个商机详情"],
                    "tags": ["crud", "读取"]
                  },
                  {
                    "id": "opportunities/list",
                    "title": "分页列出商机",
                    "kind": "query",
                    "operation": "list",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "page": { "type": "number" },
                          "page_size": { "type": "number" },
                          "owner_user_id": { "type": "string" },
                          "account_id": { "type": "string" },
                          "stage_name": { "type": "string" },
                          "is_closed": { "type": "boolean" }
                        }
                      }
                    },
                    "examples": ["列出某销售人员的未关闭商机", "按阶段分页查看商机"],
                    "tags": ["crud", "列表", "管道"]
                  },
                  {
                    "id": "opportunities/update",
                    "title": "更新商机（字段更新）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id"],
                        "properties": {
                          "opportunity_id": { "type": "string" },
                          "stage_name": { "type": "string" },
                          "amount": { "type": "number" },
                          "probability": { "type": "number" },
                          "close_date": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["更新商机金额与阶段", "调整预计关闭日期"],
                    "tags": ["crud", "更新"]
                  },
                  {
                    "id": "opportunities/update_stage",
                    "title": "推进商机阶段",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id", "stage_name"],
                        "properties": {
                          "opportunity_id": { "type": "string" },
                          "stage_name": { "type": "string" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["推进商机阶段", "把商机状态改了"],
                    "tags": ["推进", "阶段"]
                  },
                  {
                    "id": "opportunities/transfer_owner",
                    "title": "转移商机负责人",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id", "owner_user_id"],
                        "properties": {
                          "opportunity_id": { "type": "string" },
                          "owner_user_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["转移商机", "把这个单子转给李四"],
                    "tags": ["转移", "负责人"]
                  },
                  {
                    "id": "opportunities/delete",
                    "title": "删除商机（谨慎）",
                    "kind": "command",
                    "operation": "delete",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id"],
                        "properties": {
                          "opportunity_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["删除误建商机"],
                    "tags": ["crud", "删除", "治理"]
                  },
                  {
                    "id": "opportunities/close_won",
                    "title": "赢单（关闭为成交）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id", "close_date"],
                        "properties": {
                          "opportunity_id": { "type": "string" },
                          "close_date": { "type": "string" },
                          "amount": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["将商机标记为 Closed Won", "完成成交并记录关闭日期"],
                    "tags": ["ddd", "赢单", "业务动作"]
                  },
                  {
                    "id": "opportunities/close_lost",
                    "title": "丢单（关闭为失败）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Opportunity",
                    "entity_name": "opportunities",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["opportunity_id", "close_date"],
                        "properties": {
                          "opportunity_id": { "type": "string" },
                          "close_date": { "type": "string" },
                          "lost_reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["将商机标记为 Closed Lost 并记录原因"],
                    "tags": ["ddd", "丢单", "业务动作"]
                  },
                  {
                    "id": "opportunities/funnel_report",
                    "title": "生成销售漏斗报表",
                    "description": "按时间范围与销售团队生成漏斗：各阶段商机数、金额、转化率。",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "start_date": { "type": "string", "description": "开始日期（YYYY-MM-DD）" },
                          "end_date": { "type": "string", "description": "结束日期（YYYY-MM-DD）" },
                          "team": { "type": "string", "description": "销售团队（可选）" }
                        }
                      }
                    },
                    "examples": ["按阶段看本月商机漏斗", "各销售团队的漏斗转化率"],
                    "tags": ["funnel", "pipeline", "sales"]
                  }
                ],
                "rules": [
                  {
                    "id": "crm/rule_win_definition",
                    "title": "赢单口径定义",
                    "severity": "warn",
                    "when": { "entity": "metric", "selectors": { "metric_names": ["won_opportunity_count", "won_amount", "win_rate"] } },
                    "constraint": { "type": "filter" },
                    "message": "赢单默认口径：is_closed=true 且 is_won=true。",
                    "remediation": "如需按 StageName(Closed Won) 口径，请统一为同一逻辑，并在模型 instructions 中说明优先级。",
                    "tags": ["口径", "赢单"]
                  },
                  {
                    "id": "crm/rule_stagnant_opp",
                    "title": "停滞商机定义",
                    "severity": "info",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "filter" },
                    "message": "超过30天未跟进或未推进阶段的未关闭商机视为停滞商机。",
                    "tags": ["定义", "风险"]
                  }
                ]
              }
        fields:
          - name: opportunity_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.opportunity_id
            description: 商机内部ID
          - name: opportunity_sf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.opportunity_sf_id
            description: Salesforce Opportunity.Id
            ai_context:
              synonyms: ["Opportunity.Id", "SFID"]
          - name: account_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.account_id
            description: 外键:Account
            ai_context:
              synonyms: ["客户ID", "AccountId"]
          - name: owner_user_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.owner_user_id
            description: 外键:Owner(User)
            ai_context:
              synonyms: ["负责人", "销售人员ID", "OwnerId"]
          - name: stage_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.stage_name
            description: 阶段(如 Prospecting/Proposal/Closed Won 等)
            ai_context:
              synonyms: ["阶段", "商机阶段"]
          - name: probability
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.probability
            description: 成交概率(0~1 或 0~100,口径依赖源系统)
            ai_context:
              synonyms: ["概率", "成交概率"]
          - name: amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.amount
            description: 商机金额(通常为预估金额/报价金额)
            ai_context:
              synonyms: ["商机金额", "金额"]
          - name: expected_revenue
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.expected_revenue
            description: 期望收入(可能等于 amount*probability,依赖系统配置)
            ai_context:
              synonyms: ["期望收入", "加权收入"]
          - name: is_closed
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.is_closed
            description: 是否已关闭
          - name: is_won
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.is_won
            description: 是否赢单
            ai_context:
              synonyms: ["赢单", "成交"]
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.created_date
            description: 创建时间
            dimension:
              is_time: true
          - name: close_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunities.close_date
            description: 预计/实际关闭日期
            dimension:
              is_time: true

      # ---------------------------
      # Fact: Opportunity Line Items
      # ---------------------------
      - name: opportunity_line_items
        source: salesforce.salesforce.opportunity_line_item
        primary_key: [opportunity_line_item_id]
        unique_keys:
          - [opportunity_line_item_id]
          - [opportunity_line_item_sf_id]
        description: 商机产品明细事实表(产品/价格/数量粒度)
        ai_context:
          synonyms:
            - "商机明细"
            - "产品明细"
            - "报价明细"
        fields:
          - name: opportunity_line_item_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.opportunity_line_item_id
            description: 明细内部ID
          - name: opportunity_line_item_sf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.opportunity_line_item_sf_id
            description: Salesforce OpportunityLineItem.Id
          - name: opportunity_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.opportunity_id
            description: 外键:Opportunity
          - name: product_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.product_id
            description: 外键:Product2
          - name: pricebook_entry_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.pricebook_entry_id
            description: 外键:PricebookEntry
          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.quantity
            description: 数量
          - name: unit_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.unit_price
            description: 单价(成交/报价口径依赖业务)
          - name: total_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.total_price
            description: 行总价(quantity * unit_price)
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: opportunity_line_items.created_date
