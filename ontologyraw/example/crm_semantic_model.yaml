      # ---------------------------
      # Fact: Cases (Support)
      # ---------------------------
      - name: cases
        source: salesforce.salesforce.case
        primary_key: [case_id]
        unique_keys:
          - [case_id]
          - [case_sf_id]
          - [case_number]
        description: 客户工单事实表(支持与服务运营)
        ai_context:
          synonyms:
            - "工单"
            - "Case"
            - "客服工单"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "SALESFORCE_CRM",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "cases/escalate",
                    "title": "升级工单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Case",
                    "entity_name": "cases",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["case_id", "priority"],
                        "properties": {
                          "case_id": { "type": "string" },
                          "priority": { "type": "string", "enum": ["High", "Critical"] },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["超时未解决，升级工单", "将工单优先级设为最高"],
                    "tags": ["服务", "升级"]
                  },
                  {
                    "id": "cases/close",
                    "title": "关闭工单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Case",
                    "entity_name": "cases",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["case_id"],
                        "properties": {
                          "case_id": { "type": "string" },
                          "resolution_note": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["问题已解决，关闭工单"],
                    "tags": ["服务", "关闭"]
                  }
                ],
                "rules": [
                  {
                    "id": "crm/rule_case_sla",
                    "title": "工单响应 SLA 规则",
                    "severity": "warn",
                    "when": { "entity": "dataset" },
                    "constraint": { "type": "filter" },
                    "message": "高优先级（Priority=High/Critical）工单响应与解决时长不应超过2小时。",
                    "tags": ["SLA", "预警"]
                  }
                ]
              }
        fields:
          - name: case_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.case_id
            description: 工单内部ID
          - name: case_sf_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.case_sf_id
            description: Salesforce Case.Id
          - name: case_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.case_number
            description: 工单编号(业务主键)
          - name: account_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.account_id
            description: 外键:Account
          - name: contact_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.contact_id
            description: 外键:Contact
          - name: owner_user_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.owner_user_id
            description: 外键:Owner(User)
          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.status
            description: 工单状态
          - name: priority
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.priority
            description: 优先级
          - name: created_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.created_date
            description: 创建时间
            dimension:
              is_time: true
          - name: closed_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cases.closed_date
            description: 关闭时间
            dimension:
              is_time: true

