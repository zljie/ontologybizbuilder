# yaml-language-server: $schema=../core-spec/osi-schema.json

version: "0.1.1"

semantic_model:
  - name: restaurant_management_model
    description: 餐饮管理系统语义模型（点餐服务/菜品管理/运营活动/经营分析）
    ai_context:
      instructions: "用于餐饮经营分析与问答。围绕订单明细（order_items）做聚合，按门店、菜品、品类、时间、渠道、活动等维度切分。若用户只说“销量/营收”，默认指已支付订单；如需退款/取消需明确说明。"
      synonyms:
        - "餐饮系统"
        - "点餐系统"
        - "门店经营"
        - "菜品运营"
      examples:
        - "本月各门店营业额是多少？"
        - "按菜品统计销量 Top 10"
        - "活动 A 带来的增量销量是多少？"
        - "按小时看高峰下单量"
        - "退款金额占比是多少？"

    datasets:
      - name: orders
        source: restaurant.public.orders
        primary_key: [order_id]
        unique_keys:
          - [order_id]
          - [order_number]
        description: 订单主表（点餐服务：每笔订单一行）
        ai_context:
          synonyms:
            - "订单"
            - "下单记录"
        fields:
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_id
            description: 订单ID
          - name: order_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_number
            description: 订单号（业务主键）
          - name: store_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.store_id
            description: 外键：门店
            ai_context:
              synonyms: ["门店ID"]
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.customer_id
            description: 外键：顾客
            ai_context:
              synonyms: ["顾客ID", "会员ID"]
          - name: channel
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.channel
            description: 下单渠道（如 dine_in/takeaway/delivery/app）
            ai_context:
              synonyms: ["渠道", "堂食外卖"]
          - name: order_status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_status
            description: 订单状态（CREATED/PAID/CANCELLED/REFUNDED等）
            ai_context:
              synonyms: ["状态", "是否支付"]
          - name: order_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.order_time
            description: 下单时间
            dimension:
              is_time: true
          - name: paid_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.paid_time
            description: 支付时间（未支付为空）
            dimension:
              is_time: true
          - name: total_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: orders.total_amount
            description: 订单总金额（含折扣后/税费口径需在说明中统一）
            ai_context:
              synonyms: ["订单金额", "实付金额"]

      - name: order_items
        source: restaurant.public.order_items
        primary_key: [order_item_id]
        unique_keys:
          - [order_item_id]
        description: 订单明细（点餐服务：每个菜品一行，作为事实粒度推荐入口）
        ai_context:
          synonyms:
            - "点单明细"
            - "订单行"
            - "菜品销量明细"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "PALANTIR",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "orders/create",
                    "title": "创建订单（下单）",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["store_id", "channel", "order_time"],
                        "properties": {
                          "store_id": { "type": "string" },
                          "customer_id": { "type": "string" },
                          "channel": { "type": "string" },
                          "order_time": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["创建一笔堂食订单", "用户下单生成订单"],
                    "tags": ["ddd", "订单", "下单"]
                  },
                  {
                    "id": "order_items/create",
                    "title": "新增订单明细（加菜）",
                    "kind": "command",
                    "operation": "create",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "non_idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id", "dish_id", "quantity"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "dish_id": { "type": "string" },
                          "quantity": { "type": "number" },
                          "item_price": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["给订单加一份宫保鸡丁", "新增一条点单明细"],
                    "tags": ["crud", "点单", "写入"]
                  },
                  {
                    "id": "order_items/update",
                    "title": "修改订单明细（改数量/改价）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_item_id"],
                        "properties": {
                          "order_item_id": { "type": "string" },
                          "quantity": { "type": "number" },
                          "item_price": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["把某条点单数量改为 2", "修改明细单价"],
                    "tags": ["crud", "更新"]
                  },
                  {
                    "id": "order_items/delete",
                    "title": "删除订单明细（退菜）",
                    "kind": "command",
                    "operation": "delete",
                    "aggregate": "Order",
                    "entity_name": "order_items",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_item_id"],
                        "properties": {
                          "order_item_id": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["退掉某条菜品明细", "删除点单明细"],
                    "tags": ["crud", "退菜", "删除"]
                  },
                  {
                    "id": "orders/pay",
                    "title": "支付订单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id", "paid_time"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "paid_time": { "type": "string" },
                          "payment_method": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["将订单标记为已支付", "支付完成更新支付时间"],
                    "tags": ["ddd", "支付", "业务动作"]
                  },
                  {
                    "id": "orders/refund",
                    "title": "退款订单",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Order",
                    "entity_name": "orders",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["order_id"],
                        "properties": {
                          "order_id": { "type": "string" },
                          "refund_amount": { "type": "number" },
                          "reason": { "type": "string" }
                        }
                      }
                    },
                    "examples": ["对订单发起退款", "取消订单并退款"],
                    "tags": ["ddd", "退款", "业务动作"]
                  },
                  {
                    "id": "order_items/top_dishes",
                    "title": "生成菜品销量 TopN",
                    "description": "按时间/门店/品类筛选后输出销量 TopN 菜品，用于运营复盘。",
                    "applies_to": { "entity": "metric", "selectors": { "metric_names": ["dish_units_sold"] } },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "properties": {
                          "start_date": { "type": "string", "description": "开始日期（YYYY-MM-DD）" },
                          "end_date": { "type": "string", "description": "结束日期（YYYY-MM-DD）" },
                          "store_id": { "type": "string", "description": "门店ID（可选）" },
                          "category_id": { "type": "string", "description": "品类ID（可选）" },
                          "top_n": { "type": "number", "description": "Top N（默认 10）" }
                        }
                      }
                    },
                    "examples": ["按菜品统计销量 Top 10", "本周各门店销量Top5菜品"],
                    "tags": ["销量", "排行", "菜品运营"]
                  }
                ],
                "rules": [
                  {
                    "id": "food/rule_paid_only_default",
                    "title": "营收/销量默认口径：仅已支付",
                    "severity": "warn",
                    "when": { "entity": "metric", "selectors": { "metric_names": ["gross_revenue", "dish_units_sold"] } },
                    "constraint": { "type": "filter" },
                    "message": "营收与销量默认仅统计已支付订单（orders.order_status='PAID'）。",
                    "remediation": "如需包含退款/取消，请新增独立指标或在问题中明确说明口径。",
                    "tags": ["口径", "支付状态"]
                  }
                ]
              }
        fields:
          - name: order_item_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.order_item_id
            description: 明细行ID
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.order_id
            description: 外键：订单
          - name: dish_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.dish_id
            description: 外键：菜品
            ai_context:
              synonyms: ["菜品ID"]
          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.quantity
            description: 数量
            ai_context:
              synonyms: ["份数", "销量"]
          - name: item_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_price
            description: 单价（下单时价格快照）
            ai_context:
              synonyms: ["单价"]
          - name: item_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_amount
            description: 行金额（quantity * item_price - item_discount）
            ai_context:
              synonyms: ["行金额", "明细金额"]
          - name: item_discount_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.item_discount_amount
            description: 明细折扣金额
            ai_context:
              synonyms: ["折扣金额"]
          - name: served_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_items.served_time
            description: 出餐/上菜时间（可用于出餐时效分析）
            dimension:
              is_time: true

      - name: dishes
        source: restaurant.public.dishes
        primary_key: [dish_id]
        unique_keys:
          - [dish_id]
          - [dish_code]
        description: 菜品主数据（菜品管理服务）
        ai_context:
          synonyms:
            - "菜品"
            - "菜单"
        custom_extensions:
          - vendor_name: COMMON
            data: |
              {
                "namespace": "PALANTIR",
                "behavior_layer_version": "0.1",
                "action_types": [
                  {
                    "id": "dishes/update_price",
                    "title": "调整菜品价格（调价）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Dish",
                    "entity_name": "dishes",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["dish_id", "base_price"],
                        "properties": {
                          "dish_id": { "type": "string" },
                          "base_price": { "type": "number" },
                          "effective_time": { "type": "string", "description": "生效时间（可选）" }
                        }
                      }
                    },
                    "examples": ["把某菜品价格调整为 28", "对销量最差的菜品进行调价"],
                    "synonyms": ["调价", "改价", "调整定价", "修改价格"],
                    "tags": ["菜品", "定价", "更新", "运营"]
                  },
                  {
                    "id": "dishes/update",
                    "title": "修改菜品信息（名称/品类/上下架）",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Dish",
                    "entity_name": "dishes",
                    "idempotency": "unknown",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["dish_id"],
                        "properties": {
                          "dish_id": { "type": "string" },
                          "dish_name": { "type": "string" },
                          "category_id": { "type": "string" },
                          "is_active": { "type": "boolean" },
                          "base_price": { "type": "number" }
                        }
                      }
                    },
                    "examples": ["把菜品名称改为 宫保鸡丁", "修改菜品品类", "设置菜品为下架"],
                    "synonyms": ["修改菜品", "更新菜品", "编辑菜品", "改菜品信息"],
                    "tags": ["菜品", "更新", "运营"]
                  },
                  {
                    "id": "dishes/toggle_status",
                    "title": "菜品上下架",
                    "kind": "command",
                    "operation": "update",
                    "aggregate": "Dish",
                    "entity_name": "dishes",
                    "idempotency": "idempotent",
                    "applies_to": { "entity": "dataset" },
                    "io_schema": {
                      "input_schema": {
                        "type": "object",
                        "additionalProperties": false,
                        "required": ["dish_id", "is_active"],
                        "properties": {
                          "dish_id": { "type": "string" },
                          "is_active": { "type": "boolean", "description": "true=上架，false=下架" }
                        }
                      }
                    },
                    "examples": ["下架某菜品", "将菜品设置为上架可售"],
                    "synonyms": ["上架", "下架", "停售", "恢复售卖"],
                    "tags": ["菜品", "上下架", "运营"]
                  }
                ],
                "rules": []
              }
        fields:
          - name: dish_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_id
            description: 菜品ID
          - name: dish_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_code
            description: 菜品编码（业务主键）
          - name: dish_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.dish_name
            description: 菜品名称
            ai_context:
              synonyms: ["名称", "菜名"]
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.category_id
            description: 外键：品类
          - name: is_active
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.is_active
            description: 是否上架
            ai_context:
              synonyms: ["上架", "可售"]
          - name: base_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.base_price
            description: 标准定价（非下单快照）
          - name: created_at
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dishes.created_at
            description: 创建时间
            dimension:
              is_time: true

      - name: dish_categories
        source: restaurant.public.dish_categories
        primary_key: [category_id]
        unique_keys:
          - [category_id]
          - [category_code]
        description: 菜品品类（菜品管理服务）
        ai_context:
          synonyms:
            - "品类"
            - "菜品分类"
        fields:
          - name: category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.category_id
            description: 品类ID
          - name: category_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.category_name
            description: 品类名称
            ai_context:
              synonyms: ["分类名称", "类目"]
          - name: parent_category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dish_categories.parent_category_id
            description: 上级品类ID（可用于层级品类）

      - name: stores
        source: restaurant.public.stores
        primary_key: [store_id]
        unique_keys:
          - [store_id]
          - [store_code]
        description: 门店维度（经营分析/组织维度）
        ai_context:
          synonyms:
            - "门店"
            - "分店"
            - "店铺"
        fields:
          - name: store_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_id
            description: 门店ID
          - name: store_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_code
            description: 门店编码
          - name: store_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.store_name
            description: 门店名称
            ai_context:
              synonyms: ["店名"]
          - name: city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.city
            description: 城市
          - name: region
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: stores.region
            description: 区域/大区

      - name: customers
        source: restaurant.public.customers
        primary_key: [customer_id]
        unique_keys:
          - [customer_id]
          - [customer_number]
        description: 顾客/会员维度（会员分析）
        ai_context:
          synonyms:
            - "顾客"
            - "会员"
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.customer_id
            description: 顾客ID
          - name: customer_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.customer_number
            description: 会员编号（业务主键）
          - name: full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.first_name || ' ' || customers.last_name
            description: 姓名（计算字段）
            ai_context:
              synonyms: ["姓名", "顾客姓名", "会员姓名"]
          - name: phone
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.phone
            description: 手机号
            ai_context:
              synonyms: ["手机号", "电话"]
          - name: join_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customers.join_date
            description: 注册时间
            dimension:
              is_time: true

      - name: promotions
        source: restaurant.public.promotions
        primary_key: [promotion_id]
        unique_keys:
          - [promotion_id]
          - [promotion_code]
        description: 运营活动主数据（菜品运营服务：活动、券、折扣）
        ai_context:
          synonyms:
            - "活动"
            - "促销"
            - "优惠"
        fields:
          - name: promotion_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: promotions.promotion_id
            description: 活动ID
          - name: promotion_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: promotions.promotion_code
            description: 活动编码
          - name: promotion_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: promotions.promotion_name
            description: 活动名称
          - name: start_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: promotions.start_date
            description: 开始日期
            dimension:
              is_time: true
          - name: end_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: promotions.end_date
            description: 结束日期
            dimension:
              is_time: true

      - name: order_discounts
        source: restaurant.public.order_discounts
        primary_key: [order_discount_id]
        unique_keys:
          - [order_discount_id]
        description: 订单优惠明细（订单与活动的桥表/事实）
        ai_context:
          synonyms:
            - "订单优惠"
            - "活动使用"
        fields:
          - name: order_discount_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_discounts.order_discount_id
            description: 订单优惠ID
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_discounts.order_id
            description: 外键：订单
          - name: promotion_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_discounts.promotion_id
            description: 外键：活动
          - name: discount_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_discounts.discount_amount
            description: 优惠金额

      - name: date_dim
        source: restaurant.public.date_dim
        primary_key: [date]
        unique_keys:
          - [date]
        description: 日期维度（时间切片）
        ai_context:
          synonyms:
            - "日期"
            - "日历"
        fields:
          - name: date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_dim.date
            description: 日期
            dimension:
              is_time: true
          - name: year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_dim.year
            description: 年
            dimension:
              is_time: true
          - name: month_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_dim.month_name
            description: 月份（如：2026-01）
            dimension:
              is_time: true
          - name: quarter_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_dim.quarter_name
            description: 季度（如：2026Q1）
            dimension:
              is_time: true

    relationships:
      - name: order_items_to_orders
        from: order_items
        to: orders
        from_columns: [order_id]
        to_columns: [order_id]
        ai_context:
          synonyms: ["订单明细所属订单"]

      - name: orders_to_stores
        from: orders
        to: stores
        from_columns: [store_id]
        to_columns: [store_id]
        ai_context:
          synonyms: ["订单发生门店"]

      - name: orders_to_customers
        from: orders
        to: customers
        from_columns: [customer_id]
        to_columns: [customer_id]
        ai_context:
          synonyms: ["谁下的单", "顾客下单关系"]

      - name: order_items_to_dishes
        from: order_items
        to: dishes
        from_columns: [dish_id]
        to_columns: [dish_id]
        ai_context:
          synonyms: ["点了什么菜", "菜品销量关系"]

      - name: dishes_to_categories
        from: dishes
        to: dish_categories
        from_columns: [category_id]
        to_columns: [category_id]
        ai_context:
          synonyms: ["菜品所属品类"]

      - name: order_discounts_to_orders
        from: order_discounts
        to: orders
        from_columns: [order_id]
        to_columns: [order_id]
        ai_context:
          synonyms: ["订单优惠所属订单"]

      - name: order_discounts_to_promotions
        from: order_discounts
        to: promotions
        from_columns: [promotion_id]
        to_columns: [promotion_id]
        ai_context:
          synonyms: ["订单使用活动"]

      - name: orders_to_paid_date
        from: orders
        to: date_dim
        from_columns: [paid_time]
        to_columns: [date]
        ai_context:
          synonyms: ["支付日期关系"]
      - name: order_items_to_served_date
        from: order_items
        to: date_dim
        from_columns: [served_time]
        to_columns: [date]
        ai_context:
          synonyms: ["出餐日期关系"]

    metrics:
      - name: total_order_items
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(order_items.order_item_id)
        description: 点餐明细总行数（可用于总点单量趋势）
        ai_context:
          synonyms: ["点单量", "明细数"]

      - name: total_orders
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(orders.order_id)
        description: 订单总数（包含所有状态；常用口径建议用 paid_orders）
        ai_context:
          synonyms: ["订单量", "下单量"]

      - name: paid_orders
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.paid_time IS NOT NULL AND orders.order_status = 'PAID' THEN 1 ELSE 0 END)
        description: 已支付订单数（默认口径）
        ai_context:
          synonyms: ["支付订单数", "成交订单数"]

      - name: gross_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN orders.total_amount ELSE 0 END)
        description: 营收（默认：已支付订单 total_amount 之和）
        ai_context:
          synonyms: ["营业额", "销售额", "收入"]

      - name: dish_units_sold
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'PAID' THEN order_items.quantity ELSE 0 END)
        description: 菜品销量（默认口径：已支付订单明细 quantity 之和；需经 orders join）
        ai_context:
          synonyms: ["销量", "售出份数", "卖了多少"]

      - name: discount_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(order_discounts.discount_amount)
        description: 优惠金额总计（订单优惠明细之和）
        ai_context:
          synonyms: ["优惠额", "折扣金额"]

      - name: refund_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(CASE WHEN orders.order_status = 'REFUNDED' THEN orders.total_amount ELSE 0 END)
        description: 退款金额（口径示例：退款订单 total_amount 之和，实际可拆退款流水表）
        ai_context:
          synonyms: ["退款", "退单金额"]

      - name: avg_prep_time_minutes
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(CASE WHEN order_items.served_time IS NOT NULL THEN (order_items.served_time - orders.order_time) END)
        description: 平均出餐时长（示例表达式；单位取决于数据库时间差语义）
        ai_context:
          synonyms: ["出餐时效", "上菜速度", "制作时长"]
